<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASCII Canvas Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div id="app">
    <!-- Top Bar -->
    <header id="topbar">
      <div class="topbar-left">
        <svg class="logo-icon" width="20" height="20" viewBox="0 0 20 20" fill="none" aria-label="ASCII Canvas Editor">
          <rect x="1" y="1" width="18" height="18" rx="3" stroke="currentColor" stroke-width="1.5"/>
          <text x="5" y="14" fill="currentColor" font-family="monospace" font-size="11" font-weight="bold">A</text>
        </svg>
        <span class="topbar-title">ASCII Canvas</span>
      </div>
      <div class="topbar-center">
        <button id="btn-undo" class="topbar-btn" title="Undo (Ctrl+Z)" disabled>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8h8a3 3 0 010 6H8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M6 5L3 8l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button id="btn-redo" class="topbar-btn" title="Redo (Ctrl+Shift+Z)" disabled>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M13 8H5a3 3 0 000 6h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M10 5l3 3-3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <div class="topbar-divider"></div>
        <button id="btn-clear" class="topbar-btn" title="Clear Canvas">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
        <div class="topbar-divider"></div>
        <button id="btn-copy" class="topbar-btn copy-btn" title="Copy ASCII (Ctrl+Shift+C)">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="5" y="5" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="1.3"/><path d="M3 11V3.5A.5.5 0 013.5 3H11" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
          <span>Copy ASCII</span>
        </button>
      </div>
      <div class="topbar-right">
        <span id="zoom-display" class="zoom-label">100%</span>
        <button id="btn-zoom-fit" class="topbar-btn" title="Fit to window">Fit</button>
      </div>
    </header>

    <!-- Main Area -->
    <div id="main-area">
      <!-- Left Toolbar -->
      <aside id="toolbar">
        <div class="tool-group">
          <button class="tool-btn active" data-tool="select" title="Select / Move (V)">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M4 2l2 14 3-5 5-3L4 2z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg>
            <span class="tool-label">Select</span>
            <kbd>V</kbd>
          </button>
          <button class="tool-btn" data-tool="rect" title="Rectangle (R)">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="2" y="4" width="14" height="10" rx="1" stroke="currentColor" stroke-width="1.3"/></svg>
            <span class="tool-label">Rect</span>
            <kbd>R</kbd>
          </button>
          <button class="tool-btn" data-tool="diamond" title="Diamond (D)">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 2l7 7-7 7-7-7 7-7z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg>
            <span class="tool-label">Diamond</span>
            <kbd>D</kbd>
          </button>
          <button class="tool-btn" data-tool="line" title="Line (L)">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><line x1="3" y1="15" x2="15" y2="3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
            <span class="tool-label">Line</span>
            <kbd>L</kbd>
          </button>
          <button class="tool-btn" data-tool="arrow" title="Arrow (A)">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><line x1="3" y1="15" x2="15" y2="3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><path d="M10 3h5v5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <span class="tool-label">Arrow</span>
            <kbd>A</kbd>
          </button>
          <button class="tool-btn" data-tool="text" title="Text (T)">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M4 5V3h10v2M9 3v12M6 15h6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <span class="tool-label">Text</span>
            <kbd>T</kbd>
          </button>
          <button class="tool-btn" data-tool="freehand" title="Freehand (F)">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M3 12c2-4 4-8 6-6s-2 8 0 6 4-8 6-6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
            <span class="tool-label">Free</span>
            <kbd>F</kbd>
          </button>
          <button class="tool-btn" data-tool="eraser" title="Eraser (E)">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M7 15h8M3.5 11.5l7-7 4 4-7 7-4.5.5.5-4.5z" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <span class="tool-label">Eraser</span>
            <kbd>E</kbd>
          </button>
        </div>
      </aside>

      <!-- Canvas Container -->
      <div id="canvas-container">
        <div id="canvas-wrapper">
          <canvas id="ascii-canvas"></canvas>
        </div>
      </div>

      <!-- Right Panel: Properties -->
      <aside id="props-panel">
        <div class="panel-section" id="border-style-section" style="display:none">
          <h3 class="panel-title">Border Style</h3>
          <div class="border-options">
            <button class="border-btn active" data-border="simple" title="Simple">+-|</button>
            <button class="border-btn" data-border="rounded" title="Rounded">╭╮╰╯</button>
            <button class="border-btn" data-border="double" title="Double">╔═╗</button>
            <button class="border-btn" data-border="heavy" title="Heavy">┏━┓</button>
            <button class="border-btn" data-border="ascii" title="ASCII">/\-|</button>
          </div>
        </div>
        <div class="panel-section" id="arrow-style-section" style="display:none">
          <h3 class="panel-title">Arrow Head</h3>
          <div class="border-options">
            <button class="arrow-btn active" data-arrow="standard" title="Standard">→</button>
            <button class="arrow-btn" data-arrow="triangle" title="Triangle">▶</button>
          </div>
        </div>
        <div class="panel-section" id="shortcuts-section">
          <h3 class="panel-title">Shortcuts</h3>
          <div class="shortcut-list">
            <div class="shortcut-row"><kbd>V</kbd><span>Select</span></div>
            <div class="shortcut-row"><kbd>R</kbd><span>Rectangle</span></div>
            <div class="shortcut-row"><kbd>D</kbd><span>Diamond</span></div>
            <div class="shortcut-row"><kbd>L</kbd><span>Line</span></div>
            <div class="shortcut-row"><kbd>A</kbd><span>Arrow</span></div>
            <div class="shortcut-row"><kbd>T</kbd><span>Text</span></div>
            <div class="shortcut-row"><kbd>F</kbd><span>Freehand</span></div>
            <div class="shortcut-row"><kbd>E</kbd><span>Eraser</span></div>
            <div class="shortcut-row"><kbd>Ctrl+Z</kbd><span>Undo</span></div>
            <div class="shortcut-row"><kbd>Ctrl+Shift+Z</kbd><span>Redo</span></div>
            <div class="shortcut-row"><kbd>Ctrl+Shift+C</kbd><span>Copy ASCII</span></div>
            <div class="shortcut-row"><kbd>Scroll</kbd><span>Zoom</span></div>
            <div class="shortcut-row"><kbd>Space+Drag</kbd><span>Pan</span></div>
            <div class="shortcut-row"><kbd>Del</kbd><span>Delete selected</span></div>
          </div>
        </div>
      </aside>
    </div>

    <!-- Status Bar -->
    <footer id="statusbar">
      <span id="status-tool">Tool: Select</span>
      <span id="status-pos">0, 0</span>
      <span id="status-canvas">Canvas: 120×40</span>
    </footer>

    <!-- Toast -->
    <div id="toast" class="toast hidden">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.3"/><path d="M5 8l2 2 4-4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>Copied to clipboard</span>
    </div>

    <!-- Text Input Overlay -->
    <div id="text-input-overlay" class="hidden">
      <textarea id="text-input" rows="1" placeholder="Type text..."></textarea>
    </div>
  </div>

  <script src="./app.js"></script>
<script data-pplx-inline-edit>
(function(){
  if(window===window.top)return;
  function inlineAll(orig,clone){
    if(orig.nodeType!==1)return;
    try{
      var cs=getComputedStyle(orig);
      var t='';
      for(var i=0;i<cs.length;i++){t+=cs[i]+':'+cs.getPropertyValue(cs[i])+';';}
      clone.style.cssText=t;
    }catch(e){}
    var oc=orig.children,cc=clone.children;
    for(var j=0;j<oc.length&&j<cc.length;j++){inlineAll(oc[j],cc[j]);}
  }
  function stripExternal(clone){
    var imgs=clone.querySelectorAll('img');
    for(var i=0;i<imgs.length;i++){
      var s=imgs[i].getAttribute('src');
      if(s&&!s.startsWith('data:'))imgs[i].removeAttribute('src');
    }
    var all=clone.querySelectorAll('*');
    for(var i=0;i<all.length;i++){
      var st=all[i].style.cssText;
      if(st&&st.indexOf('url(')>=0){
        all[i].style.cssText=st.replace(/url\(["']?(?!data:)[^)"']*["']?\)/gi,'none');
      }
    }
  }
  window.addEventListener('message',function(e){
    if(!e.data||e.data.type!=='INLINE_EDIT_CAPTURE_REQUEST')return;
    var scrollX=window.scrollX||window.pageXOffset||0;
    var scrollY=window.scrollY||window.pageYOffset||0;
    var w=window.innerWidth,h=window.innerHeight;
    try{
      var clone=document.documentElement.cloneNode(true);
      var rm=clone.querySelectorAll('script,link[rel="stylesheet"],style');
      for(var i=0;i<rm.length;i++){rm[i].remove();}
      inlineAll(document.documentElement,clone);
      stripExternal(clone);
      var html=new XMLSerializer().serializeToString(clone);
      var svg='<svg xmlns="http://www.w3.org/2000/svg" width="'+w+'" height="'+h+'">'
        +'<foreignObject width="100%" height="100%">'
        +'<div xmlns="http://www.w3.org/1999/xhtml" style="width:'+w+'px;height:'+h+'px;overflow:hidden">'
        +'<div style="transform:translate(-'+scrollX+'px,-'+scrollY+'px);transform-origin:top left">'
        +html+'</div></div></foreignObject></svg>';
      var svgUrl='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svg);
      var img=new Image();
      img.onload=function(){
        var c=document.createElement('canvas');c.width=w;c.height=h;
        c.getContext('2d').drawImage(img,0,0);
        window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:c.toDataURL('image/png'),scrollX:scrollX,scrollY:scrollY},'*');
      };
      img.onerror=function(){
        window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:null,scrollX:scrollX,scrollY:scrollY},'*');
      };
      img.src=svgUrl;
    }catch(err){
      window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:null,scrollX:scrollX,scrollY:scrollY},'*');
    }
  });
})();
</script></body>
</html>
